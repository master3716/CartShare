<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShoppyCat</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- LOADING VIEW -->
  <div id="view-loading" class="view">
    <div class="spinner"></div>
    <p>Loading…</p>
  </div>

  <!-- AUTH VIEW -->
  <div id="view-auth" class="view hidden">
    <div class="logo-row">
      <span class="logo-icon">🐱</span>
      <h1>ShoppyCat</h1>
    </div>

    <div class="tab-switcher">
      <button class="tab-btn active" data-tab="login-form">Login</button>
      <button class="tab-btn" data-tab="register-form">Register</button>
    </div>

    <form id="login-form" class="auth-form">
      <label for="login-email">Email</label>
      <input id="login-email" type="email" placeholder="you@example.com" required />
      <label for="login-password">Password</label>
      <input id="login-password" type="password" placeholder="••••••••" required minlength="1" />
      <div id="login-error" class="error-msg hidden"></div>
      <button type="submit" class="btn btn-primary">Login</button>
    </form>

    <form id="register-form" class="auth-form hidden">
      <label for="reg-username">Username</label>
      <input id="reg-username" type="text" placeholder="your_username" required />
      <label for="reg-email">Email</label>
      <input id="reg-email" type="email" placeholder="you@example.com" required />
      <label for="reg-password">Password</label>
      <input id="reg-password" type="password" placeholder="••••••••" required minlength="6" />
      <div id="register-error" class="error-msg hidden"></div>
      <button type="submit" class="btn btn-primary">Create Account</button>
    </form>

    <div id="server-warning" class="warning-msg hidden">
      ⚠️ Cannot reach the ShoppyCat server. Please try again later.
    </div>
  </div>

  <!-- MAIN VIEW -->
  <div id="view-main" class="view hidden">

    <div class="top-bar">
      <span id="logged-in-username" class="username-badge"></span>
      <button id="btn-logout" class="btn btn-ghost btn-sm">Logout</button>
    </div>

    <!-- Add Item -->
    <div id="no-item-detected" class="info-box hidden">
      <p>Navigate to a product page on Amazon, AliExpress, Temu, Shein or Etsy, then click the extension icon again.</p>
    </div>

    <div id="item-preview" class="item-card hidden">
      <img id="preview-image" src="" alt="Product" />
      <div class="item-details">
        <p id="preview-name" class="item-name"></p>
        <p id="preview-price" class="item-price"></p>
        <p id="preview-platform" class="item-platform"></p>
      </div>
    </div>

    <div id="add-form" class="hidden">
      <label>Categories <span id="category-auto-label" style="color:#7c5cf6;font-size:11px;font-weight:600;display:none;">✨ Auto-detected</span></label>
      <div id="item-categories" class="category-tags">
        <button type="button" class="cat-tag" data-value="electronics">🖥️ Electronics</button>
        <button type="button" class="cat-tag" data-value="fashion">👗 Fashion</button>
        <button type="button" class="cat-tag" data-value="home_kitchen">🏠 Home & Kitchen</button>
        <button type="button" class="cat-tag" data-value="baby_kids">🍼 Baby & Kids</button>
        <button type="button" class="cat-tag" data-value="beauty_health">💄 Beauty & Health</button>
        <button type="button" class="cat-tag" data-value="sports">⚽ Sports</button>
        <button type="button" class="cat-tag" data-value="books_media">📚 Books & Media</button>
        <button type="button" class="cat-tag" data-value="toys_games">🎮 Toys & Games</button>
        <button type="button" class="cat-tag" data-value="food">🍕 Food</button>
        <button type="button" class="cat-tag" data-value="pets">🐾 Pets</button>
        <button type="button" class="cat-tag" data-value="other">📦 Other</button>
      </div>

      <label for="item-notes">Notes (optional)</label>
      <input id="item-notes" type="text" placeholder="e.g. Great gift idea!" />

      <label class="checkbox-label">
        <input id="item-public" type="checkbox" checked />
        Share with friends (public)
      </label>

      <div id="add-error" class="error-msg hidden"></div>
      <button id="btn-add-item" class="btn btn-primary">Save to My List</button>
      <div id="add-success" class="success-msg hidden">✅ Saved to your list!</div>
    </div>

    <div class="footer-link">
      <a id="link-dashboard" href="#" target="_blank">Open My List →</a>
    </div>
  </div>

  <script src="../shared/constants.js"></script>
  <script src="popup.js"></script>
</body>
</html>
