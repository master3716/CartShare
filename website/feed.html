<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShoppyCat — Feed</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://shoppycat-api.fly.dev" />
  <link rel="dns-prefetch" href="https://shoppycat-api.fly.dev" />
</head>
<body>

  <nav class="navbar">
    <span class="nav-brand">🐱 ShoppyCat</span>
    <div class="nav-links">
      <a href="feed.html" class="active">Feed</a>
      <a href="dashboard.html">My List</a>
      <a href="friends.html">Friends</a>
      <a href="collections.html">Collections</a>
      <a href="notifications.html" id="nav-bell" style="position:relative;" title="Notifications">🔔<span id="nav-bell-badge" class="nav-bell-badge" style="display:none;"></span></a>
      <span id="nav-username" style="color:rgba(255,255,255,0.7);font-size:13px;"></span>
      <button id="btn-logout" class="btn btn-ghost btn-sm" style="color:#fff;border-color:rgba(255,255,255,0.4);">
        Logout
      </button>
    </div>
  </nav>

  <div class="social-feed-page">

    <div id="feed-loading" class="spinner-wrap" style="padding:60px 0;">
      <span class="spinner-sm"></span> Loading feed…
    </div>

    <div id="feed-empty" class="empty-state hidden" style="padding:80px 20px;">
      <div class="icon">👥</div>
      <p>Nothing here yet.<br />Add friends and their public purchases will appear here!</p>
      <a href="friends.html" class="btn btn-primary" style="margin-top:20px;display:inline-flex;">Find Friends →</a>
    </div>

    <div id="feed-container"></div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cache.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/feed.js"></script>
</body>
</html>
