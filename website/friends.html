<!DOCTYPE html>
<!--
  friends.html — Friends management page
  ----------------------------------------
  Three sections:
    1. Send a friend request by username.
    2. Pending incoming requests (Accept / Decline).
    3. Current friends list (View their list / Unfriend).
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShoppyCat — Friends</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://shoppycat-api.fly.dev" />
  <link rel="dns-prefetch" href="https://shoppycat-api.fly.dev" />
</head>
<body>

  <nav class="navbar">
    <span class="nav-brand">🐱 ShoppyCat</span>
    <div class="nav-links">
      <a href="feed.html">Feed</a>
      <a href="dashboard.html">My List</a>
      <a href="friends.html" class="active">Friends</a>
      <a href="collections.html">Collections</a>
      <a href="notifications.html" id="nav-bell" style="position:relative;" title="Notifications">🔔<span id="nav-bell-badge" class="nav-bell-badge" style="display:none;"></span></a>
      <span id="nav-username" style="color:rgba(255,255,255,0.7);font-size:13px;"></span>
      <button id="btn-logout" class="btn btn-ghost btn-sm" style="color:#fff;border-color:rgba(255,255,255,0.4);">
        Logout
      </button>
    </div>
  </nav>

  <div class="container">

    <!-- Add a friend -->
    <section class="card">
      <h2 class="card-title">Add a Friend</h2>
      <form id="add-friend-form" style="display:flex;gap:10px;align-items:flex-end;">
        <div class="form-group" style="flex:1;margin-bottom:0;">
          <label for="friend-username-input">Username</label>
          <input id="friend-username-input" type="text" placeholder="their_username" required />
        </div>
        <button type="submit" class="btn btn-primary">Send Request</button>
      </form>
      <div id="add-friend-msg" class="msg hidden" style="margin-top:10px;"></div>
    </section>

    <!-- Pending requests -->
    <section class="card">
      <h2 class="card-title">Pending Requests</h2>
      <div id="requests-empty" class="empty-state hidden">
        <div class="icon">📬</div>
        <p>No pending friend requests.</p>
      </div>
      <div id="requests-list" class="friend-list"></div>
    </section>

    <!-- Friends list -->
    <section class="card">
      <h2 class="card-title">My Friends</h2>
      <div id="friends-empty" class="empty-state hidden">
        <div class="icon">👥</div>
        <p>You have no friends yet.<br />Send a request using the form above!</p>
      </div>
      <div id="friends-list" class="friend-list"></div>
    </section>

  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cache.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/friends.js"></script>
</body>
</html>
