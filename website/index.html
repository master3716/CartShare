<!DOCTYPE html>
<!--
  index.html — Login / Register page
  ------------------------------------
  First page a new visitor sees.
  If already logged in, auth.js redirects them to dashboard.html.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShoppyCat — Login</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://cartshare.onrender.com" />
  <link rel="dns-prefetch" href="https://cartshare.onrender.com" />
</head>
<body class="auth-page">

  <div class="auth-box">

    <!-- Logo / branding -->
    <div class="auth-logo">
      <span>🐱</span>
      <h1>ShoppyCat</h1>
      <p>Save & share your Amazon and AliExpress finds</p>
    </div>

    <!-- Tab switcher -->
    <div class="tab-switcher">
      <button class="tab-btn active" data-tab="panel-login">Login</button>
      <button class="tab-btn" data-tab="panel-register">Register</button>
    </div>

    <!-- Login panel -->
    <div id="panel-login">
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="••••••••" required />
        </div>
        <div id="login-error" class="msg msg-error hidden"></div>
        <button type="submit" class="btn btn-primary" style="width:100%">Login</button>
      </form>
    </div>

    <!-- Register panel (hidden by default) -->
    <div id="panel-register" class="hidden">
      <form id="register-form">
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input id="reg-username" type="text" placeholder="your_username" required />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input id="reg-password" type="password" placeholder="••••••••" required />
        </div>
        <div id="register-msg" class="msg hidden"></div>
        <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
      </form>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cache.js"></script>
  <script src="js/auth.js"></script>
  <script>
    /*
     * index.js (inline — small enough to not warrant a separate file)
     *
     * 1. Redirect to dashboard if already logged in.
     * 2. Wire the tab switcher.
     * 3. Handle login and register form submissions.
     */

    // Redirect if already logged in
    Auth.redirectIfLoggedIn();

    // ---- Tab switcher ----
    document.querySelectorAll(".tab-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach((b) => b.classList.remove("active"));
        document.querySelectorAll("[id^='panel-']").forEach((p) => p.classList.add("hidden"));
        btn.classList.add("active");
        document.getElementById(btn.dataset.tab).classList.remove("hidden");
      });
    });

    // ---- Login ----
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("login-error");
      errEl.classList.add("hidden");

      const btn = e.target.querySelector("button[type='submit']");
      btn.disabled = true;
      btn.textContent = "Logging in…";

      const result = await Api.login(
        document.getElementById("login-email").value.trim(),
        document.getElementById("login-password").value
      );

      btn.disabled = false;
      btn.textContent = "Login";

      if (result.ok) {
        btn.textContent = "Loading…";
        try {
          const [feedRes, purchasesRes, savedRes, collabsRes, friendsRes, pendingRes, notifRes] =
            await Promise.all([
              Api.getFriendsFeed(),
              Api.getMyPurchases(),
              Api.getSavedItems(),
              Api.getCollections(),
              Api.getFriends(),
              Api.getPendingRequests(),
              Api.getNotifications(),
            ]);
          if (feedRes.ok) AppCache.set("feed", feedRes.data);
          if (purchasesRes.ok) AppCache.set("my_purchases", purchasesRes.data);
          if (savedRes.ok && collabsRes.ok) AppCache.set("collections", { savedItems: savedRes.data, collabs: collabsRes.data });
          if (friendsRes.ok) AppCache.set("friends", friendsRes.data);
          if (pendingRes.ok) AppCache.set("pending_requests", pendingRes.data);
          if (notifRes.ok) AppCache.set("notifications", notifRes.data);
        } catch {}
        window.location.href = "feed.html";
      } else {
        errEl.textContent = result.data?.error || "Login failed.";
        errEl.classList.remove("hidden");
      }
    });

    // ---- Register ----
    document.getElementById("register-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const msgEl = document.getElementById("register-msg");
      msgEl.className = "msg hidden";

      const btn = e.target.querySelector("button[type='submit']");
      btn.disabled = true;
      btn.textContent = "Creating account…";

      const result = await Api.register(
        document.getElementById("reg-username").value.trim(),
        document.getElementById("reg-email").value.trim(),
        document.getElementById("reg-password").value
      );

      btn.disabled = false;
      btn.textContent = "Create Account";

      if (result.ok) {
        msgEl.textContent = "Account created! Please log in.";
        msgEl.className = "msg msg-success";
        document.getElementById("login-email").value =
          document.getElementById("reg-email").value;
        // Switch to login tab
        document.querySelector('[data-tab="panel-login"]').click();
      } else {
        msgEl.textContent = result.data?.error || "Registration failed.";
        msgEl.className = "msg msg-error";
      }
    });
  </script>
</body>
</html>
