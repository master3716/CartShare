<!DOCTYPE html>
<!--
  profile.html — Public profile / shareable link page
  -----------------------------------------------------
  Accessible without login.
  URL format: profile.html?user=alice

  Shows:
    - User's avatar (initial) and username.
    - "Add Friend" button (only if the visitor is logged in and it's not
      their own profile).
    - All public purchases with "Buy Now" links.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShoppyCat — Profile</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <span class="nav-brand">🐱 ShoppyCat</span>
    <div class="nav-links">
      <a href="feed.html">Feed</a>
      <a href="dashboard.html">My List</a>
      <a href="friends.html">Friends</a>
    </div>
  </nav>

  <div class="container">
    <div id="profile-content">

      <!-- Profile header -->
      <div class="profile-header">
        <div class="profile-avatar-lg" id="profile-initial"></div>
        <div class="profile-meta">
          <h2 id="profile-username"></h2>
          <p>Public wish list</p>
        </div>
        <!-- Shown only when the viewer is a different logged-in user -->
        <button id="btn-add-friend" class="btn btn-primary hidden" style="margin-left:auto;">
          ➕ Add Friend
        </button>
      </div>

      <!-- Purchases -->
      <div id="purchases-spinner" class="spinner-wrap hidden">
        <span class="spinner-sm"></span> Loading purchases…
      </div>

      <div id="purchases-empty" class="empty-state hidden">
        <div class="icon">📭</div>
        <p>No public purchases yet.</p>
      </div>

      <div id="purchases-grid" class="purchase-grid"></div>

    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
